<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECODE тАФ LUKAS ASTRAL</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --screen-blue: #1840E8;
    --hot-pink: #FF2D78;
    --white: #FFFFFF;
    --dim: rgba(255,255,255,0.45);
    --border: rgba(255,255,255,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--screen-blue);
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  ::selection { background: var(--hot-pink); color: var(--white); }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.12) 0px,
      rgba(0,0,0,0.12) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 9999;
  }

  nav {
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    letter-spacing: 0.22em;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo::after {
    content: 'тЦо';
    animation: blink 1.1s step-end infinite;
    margin-left: 4px;
    opacity: 0.6;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0; }
  }

  .back-link {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .back-link:hover { color: var(--hot-pink); }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 5rem 2rem 6rem;
  }

  .intro {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.25em;
    color: var(--hot-pink);
    text-transform: uppercase;
    margin-bottom: 3.5rem;
    line-height: 2;
  }

  .intro span { color: rgba(255,255,255,0.4); }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    padding: 0.6rem 1.5rem 0.6rem 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: color 0.15s;
  }

  .tab.active {
    color: var(--white);
    border-bottom-color: var(--hot-pink);
  }

  .tab:hover { color: var(--white); }

  .panel { display: none; }
  .panel.active { display: block; }

  .field-label {
    font-family: 'VT323', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    min-height: 100px;
    resize: vertical;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(255,255,255,0.07);
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1.8;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: rgba(255,255,255,0.4); }
  textarea::placeholder { color: rgba(255,255,255,0.2); }

  .output-box {
    width: 100%;
    min-height: 100px;
    padding: 14px;
    border: 1px solid rgba(255,45,120,0.3);
    border-radius: 4px;
    background: rgba(255,45,120,0.05);
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    line-height: 2;
    word-break: break-all;
    white-space: pre-wrap;
    margin-top: 1.5rem;
  }

  .output-box.symbols {
    font-size: 1.3rem;
    letter-spacing: 0.25em;
    line-height: 2.4;
    color: var(--hot-pink);
  }

  .copy-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
  }

  .copy-btn {
    font-family: 'VT323', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 1rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }

  .copy-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }

  .copied-note {
    font-family: 'VT323', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--hot-pink);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .copied-note.show { opacity: 1; }

  .key-section {
    margin-top: 4rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
  }

  .key-label {
    font-family: 'VT323', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .key-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px;
  }

  .key-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    font-family: 'VT323', monospace;
    font-size: 0.9rem;
    color: var(--dim);
  }

  .key-sym {
    font-size: 1.1rem;
    color: var(--hot-pink);
    min-width: 1.3rem;
  }

  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'VT323', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LUKAS ASTRAL</a>
  <a href="index.html" class="back-link">тЖР Back</a>
</nav>

<div class="wrap">

  <div class="intro">
    тЦ╢ THE LANGUAGE EXISTS.<br>
    <span>WHETHER YOU SPEAK IT IS UP TO YOU.</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('encode')">Encode</button>
    <button class="tab" onclick="switchTab('decode')">Decode</button>
  </div>

  <div class="panel active" id="panel-encode">
    <div class="field-label">тЦ╢ Your text</div>
    <textarea id="encode-input" placeholder="WANNA TRY YOUR LUCK?" style="font-size: 1.1rem; letter-spacing: 0.2em; line-height: 2.2;"></textarea>
    <div class="output-box symbols" id="encode-output">тЬж</div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyText('encode-output', 'copied-encode')">Copy тЖЧ</button>
      <span class="copied-note" id="copied-encode">Copied.</span>
    </div>
  </div>

  <div class="panel" id="panel-decode">
    <div class="field-label">тЦ╢ Paste symbols</div>
    <textarea id="decode-input" placeholder="DID YOU WANNA GET DOWN?" style="font-size: 1.1rem; letter-spacing: 0.2em; line-height: 2.2;"></textarea>
    <div class="output-box" id="decode-output" style="text-transform: uppercase; letter-spacing: 0.15em;">тАФ</div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyText('decode-output', 'copied-decode')">Copy тЖЧ</button>
      <span class="copied-note" id="copied-decode">Copied.</span>
    </div>
  </div>

  <div class="key-section">
    <div class="key-label">тЦ╢ Cipher key</div>
    <div class="key-grid" id="key-grid"></div>
  </div>

</div>

<footer>BOYSWAG тАФ LUKAS ASTRAL &nbsp;///&nbsp; All rights reserved</footer>

<script>
const MAP = {
  A:'тЬж', B:'тНЙ', C:'тШ┐', D:'ЁЯЬ│', E:'тЫз', F:'ЁЯЬ╕',
  G:'тШ╜', H:'ЁЯЬ║', I:'тЯБ', J:'тЩ░', K:'ЁЯЬП', L:'тНЯ',
  M:'тШй', N:'тЬ╢', O:'тШК', P:'тШд', Q:'тЪФ', R:'тЬЭ',
  S:'ЁЯЬБ', T:'тЬ╢╠И', U:'тШЙ', V:'тЬа', W:'тНз', X:'ЁЯЬ┤',
  Y:'тМм', Z:'тШ╕',
  ' ':'  ',
  "'":'┬╖', ','  :'┬╖,', '.':'┬╖.', '-':'тНж', 'тАФ':'тНжтНж',
  '?':'тЯБ╠И', '!':'тЫз╠И'
};

const RMAP = {};
Object.entries(MAP).forEach(([k,v]) => { if(k !== ' ') RMAP[v.trim()] = k; });

const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function encode(text) {
  return text.toUpperCase().split('').map(c => MAP[c] !== undefined ? MAP[c] : c).join(' ');
}

function decode(text) {
  const tokens = text.trim().split(/\s+/);
  return tokens.map(t => RMAP[t] !== undefined ? RMAP[t] : t).join('');
}

document.getElementById('encode-input').addEventListener('input', function() {
  const val = this.value.trim();
  document.getElementById('encode-output').textContent = val ? encode(val) : 'тЬж';
});

document.getElementById('decode-input').addEventListener('input', function() {
  const val = this.value.trim();
  document.getElementById('decode-output').textContent = val ? decode(val) : 'тАФ';
});

function copyText(id, noteId) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const note = document.getElementById(noteId);
    note.classList.add('show');
    setTimeout(() => note.classList.remove('show'), 1800);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

const grid = document.getElementById('key-grid');
ALPHA.split('').forEach(c => {
  const item = document.createElement('div');
  item.className = 'key-item';
  item.innerHTML = `<span class="key-sym">${MAP[c]}</span><span>= ${c}</span>`;
  grid.appendChild(item);
});
</script>

</body>
</html>
